<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mis Leads</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0e0e10;
    --card: #18181c;
    --card2: #1f1f25;
    --border: #2e2e38;
    --accent: #f0e040;
    --accent2: #40e0c0;
    --red: #ff4f4f;
    --orange: #ff9933;
    --green: #44dd88;
    --purple: #b388ff;
    --text: #f0f0f4;
    --muted: #8888aa;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding-bottom: 80px; }

  /* LOADING */
  #loadingScreen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 999; }
  #loadingScreen .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse 1s ease-in-out infinite; }
  #loadingScreen .dots { display: flex; gap: 8px; }
  #loadingScreen .dots .dot:nth-child(2) { animation-delay: 0.15s; }
  #loadingScreen .dots .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse { 0%,100%{opacity:0.2;transform:scale(0.7)} 50%{opacity:1;transform:scale(1)} }
  #loadingScreen p { color: var(--muted); font-size: 13px; }

  /* HEADER */
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 20px 14px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .header-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); background: var(--card2); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }
  .sync-btn { width: 30px; height: 30px; border-radius: 50%; background: transparent; border: 1.5px solid var(--border); color: var(--muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .sync-btn:active { color: var(--accent); border-color: var(--accent); }
  .sync-btn.syncing { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FILTER TABS */
  .tabs { display: flex; gap: 8px; padding: 14px 16px 8px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'Syne', sans-serif; }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* SEARCH */
  .search-wrap { padding: 6px 16px 10px; }
  .search-wrap input { width: 100%; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; outline: none; }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }

  /* LEAD LIST */
  .list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }

  /* LEAD CARD */
  .lead-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 15px; cursor: pointer; transition: border-color 0.15s; position: relative; overflow: hidden; }
  .lead-card:active { opacity: 0.85; }
  .lead-card.priority::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .card-name { font-size: 16px; font-weight: 700; line-height: 1.2; }
  .card-product { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .badge { flex-shrink: 0; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; font-family: 'DM Mono', monospace; }

  .card-mid { margin-top: 10px; font-size: 13px; color: var(--muted); line-height: 1.4; }
  .card-bottom { margin-top: 10px; display: flex; align-items: center; justify-content: space-between; }
  .card-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .card-actions { display: flex; gap: 6px; }
  .btn-sm { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; border: 1.5px solid; cursor: pointer; font-family: 'Syne', sans-serif; transition: all 0.15s; background: transparent; text-decoration: none; display: inline-block; }

  /* STATUS BADGES */
  .s-nuevo      { background: #1a2a3a; color: #60aaff; border-color: #1d3a5a; }
  .s-contactado { background: #2a1a3a; color: var(--purple); border-color: #3a1a5a; }
  .s-llamar     { background: #3a2a10; color: var(--orange); border-color: #5a3a10; }
  .s-seguir     { background: #1a3a2a; color: var(--green); border-color: #1a5a3a; }
  .s-aplicado   { background: #3a3a10; color: var(--accent); border-color: #5a5a10; }
  .s-cerrado    { background: #1a3a1a; color: #33ff88; border-color: #1a5a1a; }
  .s-perdido    { background: #3a1a1a; color: var(--red); border-color: #5a1a1a; }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .emoji { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 20px; width: 58px; height: 58px; border-radius: 50%; background: var(--accent); color: #000; font-size: 28px; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(240,224,64,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; transition: transform 0.15s; }
  .fab:active { transform: scale(0.92); }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px 20px 40px; transform: translateY(30px); transition: transform 0.25s; }
  .overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 18px; }

  /* FORM */
  label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; margin-top: 14px; letter-spacing: 0.5px; text-transform: uppercase; }
  label:first-of-type { margin-top: 0; }
  input[type=text], input[type=tel], input[type=datetime-local], textarea, select {
    width: 100%; background: var(--card2); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 13px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; outline: none;
    -webkit-appearance: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { min-height: 70px; resize: none; }

  /* STATUS GRID */
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .status-btn { padding: 10px 8px; border-radius: 10px; border: 2px solid var(--border); font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; font-family: 'Syne', sans-serif; transition: all 0.15s; background: var(--card2); color: var(--muted); }
  .status-btn.selected { border-color: currentColor; opacity: 1; }
  .status-btn:not(.selected) { opacity: 0.5; }

  /* BTN SAVE */
  .btn-save { width: 100%; margin-top: 20px; padding: 14px; background: var(--accent); color: #000; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; border: none; border-radius: 12px; cursor: pointer; transition: opacity 0.15s; }
  .btn-save:disabled { opacity: 0.5; }
  .btn-delete { width: 100%; margin-top: 10px; padding: 12px; background: transparent; color: var(--red); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; border: 1.5px solid #3a1a1a; border-radius: 12px; cursor: pointer; }

  /* REMINDER BADGE */
  .remind-alert { background: #3a2a10; border: 1.5px solid var(--orange); color: var(--orange); font-size: 11px; padding: 3px 8px; border-radius: 6px; font-family: 'DM Mono', monospace; margin-top: 6px; display: inline-block; }

  /* PRIORITY toggle */
  .priority-row { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
  .priority-row span { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .toggle { width: 44px; height: 24px; background: var(--border); border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; border: none; }
  .toggle.on { background: var(--accent); }
  .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: left 0.2s; }
  .toggle.on::after { left: 23px; }

  /* TOAST */
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card2); border: 1.5px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 10px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.success { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <p>Conectando...</p>
</div>

<header>
  <h1>Mis <span>Leads</span></h1>
  <div class="header-right">
    <button class="sync-btn" onclick="loadLeads()" title="Sincronizar">↻</button>
    <div class="header-count" id="headerCount">0 leads</div>
  </div>
</header>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="🔍  Buscar nombre o producto..." oninput="renderLeads()">
</div>

<div class="tabs" id="tabsBar"></div>
<div class="list" id="leadList"></div>

<button class="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Nuevo Lead</h2>

    <label>Nombre / Contacto</label>
    <input type="text" id="f-name" placeholder="Ej: Juan García">

    <label>Teléfono (opcional)</label>
    <input type="tel" id="f-phone" placeholder="+54 9 11...">

    <label>Producto / Qué busca</label>
    <input type="text" id="f-product" placeholder="Ej: Préstamo personal $500k">

    <label>Estado</label>
    <div class="status-grid" id="statusGrid"></div>

    <label>Nota / Qué me dijo</label>
    <textarea id="f-note" placeholder="Ej: Me dijo que llame después de las 18hs, trabaja en..."></textarea>

    <label>Recordatorio / Cuándo llamar</label>
    <input type="datetime-local" id="f-remind">

    <div class="priority-row">
      <span>⭐ Marcar como prioritario</span>
      <button class="toggle" id="priorityToggle" onclick="this.classList.toggle('on')"></button>
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveLead()">Guardar</button>
    <button class="btn-delete" id="deleteBtn" style="display:none" onclick="deleteLead()">🗑 Eliminar este lead</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── SUPABASE CONFIG ──────────────────────────────────────────────
const SUPABASE_URL = 'https://piauqrovlqjayuboquww.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpYWV1cXJvdmxxamF5dWJvcXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Njc3MzIsImV4cCI6MjA4ODM0MzczMn0.S6AWuUmuuRkFE52DjqfGyNqZZEl0RZbzUKxNQYZdovE';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);
// ────────────────────────────────────────────────────────────────

const STATUSES = [
  { key: 'nuevo',      label: '🆕 Nuevo',              cls: 's-nuevo' },
  { key: 'contactado', label: '💬 Contactado',          cls: 's-contactado' },
  { key: 'llamar',     label: '📞 Llamarle',            cls: 's-llamar' },
  { key: 'seguir',     label: '🔁 Dar seguimiento',     cls: 's-seguir' },
  { key: 'aplicado',   label: '✅ Aplicó / En trámite', cls: 's-aplicado' },
  { key: 'cerrado',    label: '🏆 Cerrado',             cls: 's-cerrado' },
  { key: 'perdido',    label: '❌ Perdido',              cls: 's-perdido' },
];

const TABS = [
  { key: 'todos',    label: 'Todos' },
  { key: 'llamar',   label: '📞 Llamar' },
  { key: 'seguir',   label: '🔁 Seguimiento' },
  { key: 'nuevo',    label: '🆕 Nuevos' },
  { key: 'aplicado', label: '✅ En trámite' },
  { key: 'cerrado',  label: '🏆 Cerrados' },
  { key: 'perdido',  label: '❌ Perdidos' },
];

let leads = [];
let editingId = null;
let currentTab = 'todos';

// ── TOAST ────────────────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 2500);
}

// ── SUPABASE CRUD ────────────────────────────────────────────────
async function loadLeads() {
  const syncBtn = document.querySelector('.sync-btn');
  syncBtn.classList.add('syncing');
  try {
    const { data, error } = await db.from('leads').select('*').order('created', { ascending: false });
    if (error) throw error;
    leads = data || [];
    renderLeads();
    document.getElementById('loadingScreen').style.display = 'none';
  } catch(e) {
    showToast('Error al cargar leads', 'error');
    document.getElementById('loadingScreen').style.display = 'none';
  } finally {
    syncBtn.classList.remove('syncing');
  }
}

async function upsertLead(lead) {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Guardando...';
  try {
    const { error } = await db.from('leads').upsert(lead);
    if (error) throw error;
    showToast(editingId ? 'Lead actualizado ✓' : 'Lead guardado ✓', 'success');
    closeModal();
    await loadLeads();
  } catch(e) {
    showToast('Error al guardar', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar';
  }
}

async function removeLead(id) {
  try {
    const { error } = await db.from('leads').delete().eq('id', id);
    if (error) throw error;
    showToast('Lead eliminado', '');
    closeModal();
    await loadLeads();
  } catch(e) {
    showToast('Error al eliminar', 'error');
  }
}

// ── RENDER ───────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById('tabsBar').innerHTML = TABS.map(t =>
    `<button class="tab ${currentTab===t.key?'active':''}" onclick="setTab('${t.key}')">${t.label}</button>`
  ).join('');
}

function setTab(key) { currentTab = key; renderTabs(); renderLeads(); }

function getStatusInfo(key) { return STATUSES.find(s => s.key === key) || STATUSES[0]; }

function isOverdue(remind) { return remind && new Date(remind) < new Date(); }

function formatRemind(remind) {
  if (!remind) return null;
  const d = new Date(remind);
  const diff = d - new Date();
  const days = Math.round(diff / 86400000);
  const time = d.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
  const date = d.toLocaleDateString('es', {day:'numeric', month:'short'});
  if (diff < 0) return `⚠️ Vencido: ${date} ${time}`;
  if (days === 0) return `🔔 Hoy ${time}`;
  if (days === 1) return `🔔 Mañana ${time}`;
  return `🔔 ${date} ${time}`;
}

function renderLeads() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = leads.filter(l => {
    const matchTab = currentTab === 'todos' || l.status === currentTab;
    const matchSearch = !search || l.name.toLowerCase().includes(search) || (l.product||'').toLowerCase().includes(search);
    return matchTab && matchSearch;
  });

  filtered.sort((a,b) => {
    if (a.priority && !b.priority) return -1;
    if (!a.priority && b.priority) return 1;
    if (isOverdue(a.remind) && !isOverdue(b.remind)) return -1;
    if (!isOverdue(a.remind) && isOverdue(b.remind)) return 1;
    return new Date(b.created) - new Date(a.created);
  });

  document.getElementById('headerCount').textContent = `${leads.length} lead${leads.length!==1?'s':''}`;

  const list = document.getElementById('leadList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="emoji">🔍</div><p>No hay leads aquí todavía.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(lead => {
    const st = getStatusInfo(lead.status);
    const remText = formatRemind(lead.remind);
    const over = isOverdue(lead.remind);
    const phone = lead.phone ? lead.phone.replace(/\D/g,'') : '';
    return `
    <div class="lead-card ${lead.priority?'priority':''}" onclick="openModal('${lead.id}')">
      <div class="card-top">
        <div>
          <div class="card-name">${lead.name}</div>
          ${lead.product ? `<div class="card-product">${lead.product}</div>` : ''}
        </div>
        <div class="badge ${st.cls}">${st.label}</div>
      </div>
      ${lead.note ? `<div class="card-mid">${lead.note.substring(0,90)}${lead.note.length>90?'…':''}</div>` : ''}
      ${remText ? `<div class="remind-alert" style="${over?'background:#5a1a1a;border-color:var(--red);color:var(--red)':''}">${remText}</div>` : ''}
      <div class="card-bottom">
        <div class="card-date">${new Date(lead.created).toLocaleDateString('es', {day:'numeric',month:'short'})}</div>
        ${phone ? `<a class="btn-sm" style="color:var(--green);border-color:#1a5a3a;background:#1a3a2a;text-decoration:none" href="https://wa.me/${phone}" onclick="event.stopPropagation()">💬 WhatsApp</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ────────────────────────────────────────────────────────
function buildStatusGrid(selected) {
  return STATUSES.map(s =>
    `<button class="status-btn ${s.cls} ${selected===s.key?'selected':''}" onclick="selectStatus('${s.key}')" data-key="${s.key}">${s.label}</button>`
  ).join('');
}

function selectStatus(key) {
  document.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('selected', b.dataset.key === key));
}

function openModal(id) {
  editingId = id || null;
  const delBtn = document.getElementById('deleteBtn');

  if (id) {
    const lead = leads.find(l => l.id === id);
    if (!lead) return;
    document.getElementById('modalTitle').textContent = 'Editar Lead';
    delBtn.style.display = 'block';
    document.getElementById('f-name').value = lead.name || '';
    document.getElementById('f-phone').value = lead.phone || '';
    document.getElementById('f-product').value = lead.product || '';
    document.getElementById('f-note').value = lead.note || '';
    document.getElementById('f-remind').value = lead.remind ? lead.remind.slice(0,16) : '';
    const pt = document.getElementById('priorityToggle');
    lead.priority ? pt.classList.add('on') : pt.classList.remove('on');
    document.getElementById('statusGrid').innerHTML = buildStatusGrid(lead.status);
  } else {
    document.getElementById('modalTitle').textContent = 'Nuevo Lead';
    delBtn.style.display = 'none';
    document.getElementById('f-name').value = '';
    document.getElementById('f-phone').value = '';
    document.getElementById('f-product').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('f-remind').value = '';
    document.getElementById('priorityToggle').classList.remove('on');
    document.getElementById('statusGrid').innerHTML = buildStatusGrid('nuevo');
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

async function saveLead() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Ponele un nombre al contacto', 'error'); return; }
  const selectedStatus = document.querySelector('.status-btn.selected')?.dataset.key || 'nuevo';
  const remindVal = document.getElementById('f-remind').value;

  const data = {
    name,
    phone: document.getElementById('f-phone').value.trim() || null,
    product: document.getElementById('f-product').value.trim() || null,
    note: document.getElementById('f-note').value.trim() || null,
    remind: remindVal ? new Date(remindVal).toISOString() : null,
    priority: document.getElementById('priorityToggle').classList.contains('on'),
    status: selectedStatus,
  };

  if (editingId) {
    data.id = editingId;
  }

  await upsertLead(data);
}

async function deleteLead() {
  if (!confirm('¿Eliminar este lead?')) return;
  await removeLead(editingId);
}

// ── INIT ─────────────────────────────────────────────────────────
renderTabs();
loadLeads();
setInterval(renderLeads, 60000);
</script>
</body>
</html>
